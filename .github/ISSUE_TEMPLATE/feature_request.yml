name: Feature Request
description: Suggest an improvement or new workflow
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What would you like Faro to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any alternatives or workarounds you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TUI
        - CLI
        - MCP / agents
        - Capture / CDP
        - SQLite / SQL
        - Replay
        - Documentation
        - Other
